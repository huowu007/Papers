<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Reader</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #24221d;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(460px, calc(100vw - 32px));
        border: 1px solid rgba(36, 34, 29, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 18px 48px rgba(36, 34, 29, 0.12);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 18px;
        color: #686052;
        font-size: 14px;
        line-height: 1.55;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border-radius: 6px;
        border: 1px solid #24221d;
        background: #24221d;
        color: #fff;
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        padding: 0 14px;
        text-decoration: none;
        cursor: pointer;
      }

      .error a,
      .error button {
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #171717;
          color: #f2efe7;
        }

        main {
          border-color: rgba(242, 239, 231, 0.16);
          background: rgba(32, 32, 32, 0.86);
          box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
        }

        p {
          color: #bdb6aa;
        }

        a,
        button {
          border-color: #f2efe7;
          background: #f2efe7;
          color: #171717;
        }
      }
    </style>
  </head>
  <body>
    <main id="shell">
      <h1 id="title">Opening Reader</h1>
      <p id="message">Reader should open automatically. If nothing happens, use the button below.</p>
      <a id="manualLink" href="#">Open Reader</a>
    </main>

    <script>
      const shell = document.getElementById('shell');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const manualLink = document.getElementById('manualLink');

      const decodeBase64Url = value => {
        const normalized = value.replace(/-/g, '+').replace(/_/g, '/');
        const padded = normalized.padEnd(normalized.length + ((4 - normalized.length % 4) % 4), '=');
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      };

      const getReaderUrl = () => {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('u');
        const raw = params.get('url');
        if (encoded) return decodeBase64Url(encoded);
        if (raw) return raw;
        return '';
      };

      const withNonce = readerUrl => {
        const separator = readerUrl.includes('?') ? '&' : '?';
        return `${readerUrl}${separator}bridge_nonce=${Date.now()}`;
      };

      const readerUrl = getReaderUrl();

      if (!readerUrl || !readerUrl.startsWith('reader://')) {
        shell.classList.add('error');
        title.textContent = 'Reader link is missing';
        message.textContent = 'This page needs a Reader deep link in the u query parameter.';
      } else {
        const openReader = () => {
          const target = withNonce(readerUrl);
          manualLink.href = target;
          window.location.href = target;
        };

        manualLink.addEventListener('click', event => {
          event.preventDefault();
          openReader();
        });

        window.addEventListener('pageshow', openReader);
        window.addEventListener('focus', openReader);
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) openReader();
        });
        window.setTimeout(openReader, 80);
      }
    </script>
  </body>
</html>
